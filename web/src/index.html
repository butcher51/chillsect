<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<title>• • Chillsect • •</title>
		<meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0" />
		<link href="https://fonts.googleapis.com/css?family=Orbitron:700" rel="stylesheet" />
		<style>
			body,
			canvas {
				padding: 0;
				margin: 0;
			}
			body {
				background: #222222;
				color: #888;
				font-family: arial, Helvetica, Arial, sans-serif;
				text-align: center;
				overflow: hidden;
				font-size: 13px;
			}

			* {
				-webkit-touch-callout: none;
				-webkit-user-select: none;
				-khtml-user-select: none;
				-moz-user-select: none;
				-ms-user-select: none;
				user-select: none;
				cursor: default;
			}

			#loader {
				position: absolute;
				left: 0;
				top: 0;
				background: #222;
				width: 100vw;
				height: 100vh;
				color: #009bff;
				box-sizing: border-box;
				padding-top: 45vh;
				font-size: 3vw;
				font-weight: bold;
				text-align: center;
				font-family: "Orbitron", arial, Helvetica, Arial, sans-serif;
				text-shadow: 0 0 20px rgba(0, 0, 255, 1);
			}

			.loaderLink {
				color: #009bff;
			}

			.loaderLink:hover {
				color: #8ad0ff;
			}

			#tw {
				display: none;
				position: absolute;
				left: 5px;
				bottom: 5px;
				text-indent: 5px;
				text-decoration: none;
				color: #aaa;
			}

			#tw a,
			#tw a:visited,
			#tw a:hover,
			#tw a:active {
				color: #aaa;
				text-decoration: none;
			}
		</style>
	</head> 
	<body oncontextmenu="return false">
		<div id="loader">Loading bundle...</div>
		<div id="tw">
			Beta build [v1.1.3].
			<a href="https://twitter.com/chillsectGame" target="_blank">Please follow @chillsectGame</a>
		</div>
	</body>
</html>
