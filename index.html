<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<title>• • Chillsect • •</title>
		<meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0" />
		<link rel="icon" href="favicon.ico" />
		<link href="https://fonts.googleapis.com/css?family=Orbitron:700" rel="stylesheet" />
		<link rel="stylesheet" href="src/style.css" />
		<style>
			body,
			canvas {
				padding: 0;
				margin: 0;
			}
			/* The WebGL canvas fills the viewport exactly. Its drawing buffer stays
			   high-res (set in scene.js), but display size is driven purely by CSS,
			   so there are no side/edge gaps and no overflow at any devicePixelRatio.
			   display:block (in normal flow, NOT position:fixed) keeps it painting
			   behind the positioned UI overlays (#loader, .ui, panels) instead of
			   covering them. !important defends against inline width/height set
			   elsewhere. Scoped to `body > canvas` (the renderer's canvas is a direct
			   child of body) so it does NOT hit the nested <canvas> elements inside
			   the stats.js FPS panel. */
			body > canvas {
				display: block;
				width: 100vw !important;
				height: 100vh !important;
			}
			body {
				background: #222222;
				color: #888;
				font-family: arial, Helvetica, Arial, sans-serif;
				text-align: center;
				overflow: hidden;
				font-size: 13px;
			}

			* {
				-webkit-touch-callout: none;
				-webkit-user-select: none;
				-khtml-user-select: none;
				-moz-user-select: none;
				-ms-user-select: none;
				user-select: none;
				cursor: default;
			}

			#loader {
				position: absolute;
				left: 0;
				top: 0;
				background: #222;
				width: 100vw;
				height: 100vh;
				color: #009bff;
				box-sizing: border-box;
				padding-top: 45vh;
				font-size: 3vw;
				font-weight: bold;
				text-align: center;
				font-family: "Orbitron", arial, Helvetica, Arial, sans-serif;
				text-shadow: 0 0 20px rgba(0, 0, 255, 1);
			}

			.loaderLink {
				color: #009bff;
			}

			.loaderLink:hover {
				color: #8ad0ff;
			}

			#tw {
				display: none;
				position: absolute;
				left: 5px;
				bottom: 5px;
				text-indent: 5px;
				text-decoration: none;
				color: #aaa;
			}

			#tw a,
			#tw a:visited,
			#tw a:hover,
			#tw a:active {
				color: #aaa;
				text-decoration: none;
			}
		</style>
	</head> 
	<body oncontextmenu="return false">
		<div id="loader">Loading...</div>
		<div id="tw">
			Beta build [v1.1.3].
			<a href="https://twitter.com/chillsectGame" target="_blank">Please follow @chillsectGame</a>
		</div>

		<!-- Third-party libs are loaded from the jsDelivr CDN (pinned versions) so
		     the app runs on static hosting (GitHub Pages) with no build and no
		     node_modules. p2 and tween.js have no ES module build, so they load as
		     classic scripts that expose window.p2 / window.TWEEN before the module
		     graph evaluates; the import map routes the bare "p2"/"tween.js"
		     specifiers to the local ESM shims in ./vendor that re-export those
		     globals. three ships a real ESM build, so it is mapped straight to the
		     CDN module. All local paths are relative so the app also works when
		     served from a project subpath (e.g. https://user.github.io/repo/). -->
		<script src="https://cdn.jsdelivr.net/npm/p2@0.7.1/build/p2.js" charset="utf-8"></script>
		<script src="https://cdn.jsdelivr.net/npm/tween.js@16.3.5/src/Tween.js" charset="utf-8"></script>

		<script type="importmap">
			{
				"imports": {
					"three": "https://cdn.jsdelivr.net/npm/three@0.119.0/build/three.module.js",
					"p2": "./vendor/p2.js",
					"tween.js": "./vendor/tween.js"
				}
			}
		</script>

		<script type="module" src="src/index.js"></script>
	</body>
</html>
