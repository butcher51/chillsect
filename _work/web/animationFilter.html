<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Animation Filter</title>
</head>
<body onload="p()">
<script type="text/javascript">

    function p() {


        var xhttp = new XMLHttpRequest();
        xhttp.onreadystatechange = function () {
            if (xhttp.readyState == 4 && xhttp.status == 200) {

                var x = JSON.parse(xhttp.responseText);

                var tracks = x.animations[0].tracks;
                var newTracks = [];
                var k = 0;
                for (var i = 0; i < tracks.length; i++) {
                    var track = tracks[i];
                    if (track.name.indexOf('scale') < 0) {

                        var keys = track.keys;
                        var c = 0;
                        var newKeys = [];
                        for (var j = 0; j < keys.length; j++) {
                            var oldKey = keys[j];
                            if (oldKey.time > 8 && oldKey.time < 20) {
                                newKeys[c] = oldKey;
                                newKeys[c].time -= 9;
                                c++;
                            }
                        }
                        track.keys = newKeys;

                        newTracks[k++] = track;
                    }
                }
                x.animations[0].tracks = newTracks;


                var a = document.getElementById('a');

                delete x.materials;
                delete x.textures;
                delete x.images;

                var str = JSON.stringify(x);
                str = str.replace('"fps":24', '"fps":15');
                str = str.replace('"name":"default"', '"name":"move"');
                str = str.replace('"name":"default"', '"name":"move"');
                str = str.replace('"castShadow":true,', '');
                str = str.replace('"receiveShadow":true,', '');
                str = str.replace('"type": "Scene"', '"type": "Object"');
                a.innerHTML = str;


            }
        };
        xhttp.open("GET", "assets/models/enemy00.scene.json", true);
        xhttp.send();

    }
</script>
<textarea id="a">

</textarea>
</body>
</html>
