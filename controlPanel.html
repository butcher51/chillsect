<div class="header">
    <a class="close"><span>Close</span></a>
    <div class="menu">
        <a class="upgrades active">Upgrades</a>
        <a class="weapons">Weapons</a>
        <a class="info ">Info</a>
    </div>
</div>
<div class="contents">
    <div class="content upgrades">
        Upgrades
    </div>
    <div class="content weapons">
        Weapons
    </div>
    <div class="content info">
        <a id="resetLevelState">Reset level state</a><br/><br/>
        <a id="selfDestruct">Self destruct</a><br/><br/>
        <a id="levelCompleteCheat">Level complete</a><br/><br/>
    </div>
    <div class="content levelComplete">
        <div class="label"><span>Level Complete</span></div>
        <div class="wrapper">
            <div class="kyberCrystalCollected row">
                <div>Kyber crystal collected:</div>
                <div id="kyberCrystalCollected"></div>
            </div>
            <div class="creditCollected row">
                <div>Credit collected:</div>
                <div id="creditCollected"></div>
            </div>
            <div class="enemyKilled row">
                <div>Enemy killed:</div>
                <div id="enemyKilled"></div>
            </div>
            <div class="objectDestroyed row">
                <div>Object destroyed:</div>
                <div id="objectDestroyed"></div>
            </div>
            <div id="nextLevelBtn"><span>Start next mission</span></div>
            <div id="gameEndBtn"><span>Credits</span></div>
        </div>
    </div>
</div>
